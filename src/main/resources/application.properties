spring.application.name=pjt_back
spring.config.import=optional:file:.env[.properties]
server.port=8080

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/ssafy_home?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_PASSWORD:}
spring.sql.init.mode=always

server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

mybatis.mapper-locations=classpath:/mappers/*.xml
mybatis.configuration.map-underscore-to-camel-case=true

springdoc.paths-to-match=/api/**

openapi.data.service-key=${OPENAPI_DATA_SERVICE_KEY:}
openapi.its.api-key=${OPENAPI_ITS_API_KEY:}
openapi.kakao.rest-key=${OPENAPI_KAKAO_REST_KEY:}
openapi.bus.service-key=${OPENAPI_BUS_SERVICE_KEY:}
openapi.finlife.auth=${OPENAPI_FINLIFE_AUTH:}

happyhome.oauth.kakao.client-id=${OAUTH_KAKAO_CLIENT_ID:}
happyhome.oauth.kakao.client-secret=${OAUTH_KAKAO_CLIENT_SECRET:}
happyhome.oauth.naver.client-id=${OAUTH_NAVER_CLIENT_ID:}
happyhome.oauth.naver.client-secret=${OAUTH_NAVER_CLIENT_SECRET:}
happyhome.oauth.google.client-id=${OAUTH_GOOGLE_CLIENT_ID:}
happyhome.oauth.google.client-secret=${OAUTH_GOOGLE_CLIENT_SECRET:}

openapi.lh.notice-url=https://apis.data.go.kr/B552555/lhLeaseNoticeInfo1/lhLeaseNoticeInfo1
openapi.lh.supply-url=https://apis.data.go.kr/B552555/lhLeaseNoticeSplInfo1/getLeaseNoticeSplInfo1
openapi.lh.detail-url=https://apis.data.go.kr/B552555/lhLeaseNoticeDtlInfo1/getLeaseNoticeDtlInfo1
openapi.lh.complex-url=https://data.myhome.go.kr/rentalHouseList
openapi.commercial.radius-url=https://apis.data.go.kr/B553077/api/open/sdsc2/storeListInRadius
openapi.its.event-url=https://openapi.its.go.kr:9443/eventInfo
openapi.bus.base-url=https://apis.data.go.kr/1613000/BusSttnInfoInqireService
openapi.finlife.mortgage-loan-url=https://finlife.fss.or.kr/finlifeapi/mortgageLoanProductsSearch.json
openapi.finlife.rent-house-loan-url=https://finlife.fss.or.kr/finlifeapi/rentHouseLoanProductsSearch.json

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

batch.lh.enabled=false
batch.lh.cron=0 0 3 * * *
batch.bus.enabled=true
batch.bus.cron=0 0 4 ? * SUN

spring.ai.openai.api-key=${OPENAPI_CHAT_GPT:}
spring.ai.openai.base-url=${OPENAPI_CHAT_GPT_BASE_URL:https://api.openai.com}
spring.ai.openai.chat.base-url=${OPENAPI_CHAT_GPT_BASE_URL:https://api.openai.com}
spring.ai.openai.chat.completions-path=${OPENAPI_CHAT_GPT_COMPLETIONS_PATH:/v1/chat/completions}
spring.ai.openai.embedding.base-url=${OPENAPI_CHAT_GPT_BASE_URL:https://api.openai.com}
spring.ai.openai.embedding.embeddings-path=${OPENAPI_CHAT_GPT_EMBEDDINGS_PATH:/v1/embeddings}
spring.ai.openai.chat.options.model=${OPENAPI_CHAT_GPT_MODEL:gpt-4o-mini}
spring.ai.openai.chat.options.temperature=0.2
spring.ai.openai.embedding.options.model=${OPENAPI_CHAT_GPT_EMBEDDING_MODEL:text-embedding-3-small}
happyhome.ai.rag.bootstrap-limit=20
happyhome.loan.ltv-ratio=0.60
happyhome.loan.dsr-ratio=0.40
happyhome.loan.incidental-cost-ratio=0.04
happyhome.loan.recommendation-count=3
