spring.application.name=pjt_back
spring.config.import=optional:file:.env[.properties]
server.port=8080

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/ssafy_home?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_PASSWORD:}
spring.sql.init.mode=always

server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

mybatis.mapper-locations=classpath:/mappers/*.xml
mybatis.configuration.map-underscore-to-camel-case=true

springdoc.paths-to-match=/api/**

openapi.data.service-key=${OPENAPI_DATA_SERVICE_KEY:}
openapi.its.api-key=${OPENAPI_ITS_API_KEY:}
openapi.kakao.javascript-key=${OPENAPI_KAKAO_JAVASCRIPT_KEY:}

openapi.lh.notice-url=https://apis.data.go.kr/B552555/lhLeaseNoticeInfo1/lhLeaseNoticeInfo1
openapi.lh.supply-url=https://apis.data.go.kr/B552555/lhLeaseNoticeSplInfo1/getLeaseNoticeSplInfo1
openapi.lh.detail-url=https://apis.data.go.kr/B552555/lhLeaseNoticeDtlInfo1/getLeaseNoticeDtlInfo1
openapi.lh.complex-url=https://data.myhome.go.kr/rentalHouseList
openapi.commercial.radius-url=https://apis.data.go.kr/B553077/api/open/sdsc2/storeListInRadius
openapi.its.event-url=https://openapi.its.go.kr:9443/eventInfo

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

batch.lh.enabled=false
batch.lh.cron=0 0 3 * * *
