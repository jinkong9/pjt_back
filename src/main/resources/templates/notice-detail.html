<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${notice.title} + ' | SSAFY Home'">공지사항 | SSAFY Home</title>
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{layout-nav :: nav}"></div>

<main class="shell">
  <section class="section-head">
    <div>
      <p class="eyebrow">Notice Detail</p>
      <h1 style="font-size:clamp(34px,4.8vw,68px);line-height:1.08" th:text="${notice.title}">공지 제목</h1>
      <p class="muted">
        <span th:text="${notice.writer}">admin</span>
        · <span th:text="${#temporals.format(notice.createdAt, 'yyyy.MM.dd HH:mm')}">2026.05.22</span>
        <span th:if="${notice.popupEnabled}"> · 팝업 노출</span>
        <span th:if="${notice.pinned}"> · 상단 고정</span>
      </p>
    </div>
    <div class="action-row" style="margin-top:0">
      <a class="button" th:href="@{/notices}">목록</a>
      <a class="button primary" th:href="@{/notices/{id}/edit(id=${notice.noticeId})}">수정</a>
    </div>
  </section>

  <p th:if="${message}" class="alert" th:text="${message}">알림</p>

  <article class="panel notice-body">
    <p th:text="${notice.content}">공지 내용</p>
  </article>

  <form th:action="@{/notices/{id}/delete(id=${notice.noticeId})}" method="post" class="action-row"
        onsubmit="return confirm('공지사항을 삭제할까요?')">
    <button class="button danger" type="submit">삭제</button>
  </form>
</main>
</body>
</html>
