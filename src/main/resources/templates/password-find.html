<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>비밀번호 찾기 | SSAFY Home</title>
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main class="auth-page compact">
  <section class="auth-panel solo">
    <div class="auth-box">
      <a th:href="@{/home}" class="brand auth-brand">
        <span class="brand-mark">HOME</span>
        <strong>SSAFY Home</strong>
      </a>
      <h1>비밀번호 찾기</h1>
      <p th:if="${message}" th:text="${message}" class="alert"></p>
      <p th:if="${error}" th:text="${error}" class="alert error"></p>
      <form method="post" th:action="@{/password-find}" class="auth-form">
        <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <label>
          <span>아이디</span>
          <input name="userId" required>
        </label>
        <label>
          <span>이메일</span>
          <input name="email" type="email" required>
        </label>
        <button type="submit">가입 정보 확인</button>
      </form>
      <div class="auth-links">
        <a th:href="@{/login}">로그인</a>
        <a th:href="@{/register}">회원가입</a>
      </div>
    </div>
  </section>
</main>
</body>
</html>
